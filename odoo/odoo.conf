[options]
; Database host
db_host = localhost
db_port = 5432
db_user = berit_user
db_password = berit123
db_maxconn = 64

; Database configuration
dbfilter = ^berit_odoo$
db_template = template0

; Addons path
addons_path = /home/nick/odoo-19/odoo/addons,/home/nick/odoo-19/addons,/home/nick/berit-shalvah/odoo/addons

; Server configuration
xmlrpc = True
xmlrpc_interface = 0.0.0.0
xmlrpc_port = 8069

; Longpolling / gevent (WebSocket) port
longpolling_port = 8072
gevent_port = 8072

; Workers configuration
workers = 4
limit_time_cpu = 600
limit_time_real = 1200
max_cron_threads = 2

; File storage
data_dir = /var/lib/odoo

; Logging
log_level = info
log_handler = :INFO
logfile = /var/log/odoo/odoo.log
logrotate = True

; Email configuration
smtp_server = smtp.gmail.com
smtp_port = 587
smtp_user = beritfinance@gmail.com
smtp_password = your_app_password_here
smtp_ssl = False
smtp_starttls = True

; Security
admin_passwd = your_odoo_master_password_here
proxy_mode = True

; Performance
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192

; Demo data
without_demo = False

; Database operations
db_create = True
db_drop = True

; Currency
currency_rate_update_interval = 60

; Web configuration
; web.base.url is set via Settings > Technical > System Parameters, not here.
; Keeping it as a reminder only – this key is ignored by the config parser.
; web.base.url = http://localhost:8069

; Multi-processing
multiprocessing = True

; Session timeout
session_timeout = 30

; CSV import
csv_internal_sep = ,

; Report configuration
report_timeout = 600

; Debug mode (set to False in production)
debug_mode = False
